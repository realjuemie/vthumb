services:
  vthumb:
    build: .
    image: vthumb:latest
    container_name: vthumb
    restart: unless-stopped
    ports:
      - "8800:8800"
    environment:
      - PORT=8800
      - BROWSE_ROOT=/media
      - MEDIA_ROOT=/media
      - DEFAULT_COUNT=16
      - DEFAULT_COLS=4
      - DEFAULT_WIDTH=1920
      - DEFAULT_THUMB_W=640
      - DEFAULT_LABEL_LANG=en
    volumes:
      # Mount your media library read-only into the container. Edit the left
      # side to point at where your videos live on the host, e.g.
      #   - /srv/media:/media:ro
      #   - /data/movies:/media:ro
      # or a specific tree:
      #   - /Users/you/Movies:/media:ro
      - /path/to/your/media:/media:ro
